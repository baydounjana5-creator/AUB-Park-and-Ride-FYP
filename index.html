<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park And Ride: Managing Traffic Around AUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f1f5f9; }
        .parking-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            background: #f1f5f9; 
            padding: 20px;
            border-radius: 12px; 
        }
        .spot { height: 50px; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; background: white; }
        .spot.occupied { background-color: #cbd5e1; color: #64748b; cursor: not-allowed; }
        .spot.selected { background-color: #2563eb; color: white; border-color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white border-b p-6 shadow-sm mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-900">Park And Ride: Managing Traffic Around AUB - an AUB FYP Project</h1>
            <span class="text-sm font-semibold bg-blue-100 text-blue-700 px-4 py-2 rounded-full">Designed for your Comfort</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">📍 Live Shuttle Path: Paris Avenue</h2>
                <div id="map"></div>
                
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-600 font-bold uppercase">Next Departure</p>
                        <p id="next-dep" class="text-xl font-mono">--:--</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                        <p class="text-xs text-green-600 font-bold uppercase">Est. Arrival</p>
                        <p id="est-arr" class="text-xl font-mono">--:--</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border h-fit">
            <h2 class="text-lg font-bold mb-6">Parking Reservation</h2>
            
            <div class="parking-grid mb-6" id="lot"></div>

            <div class="space-y-4">
                <input type="time" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">
                    Reserve Space
                </button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const startPos = [33.895539, 35.507733]; 
        const endPos = [33.902355, 35.482753];

        const map = L.map('map').setView([33.899, 35.495], 14);
        
         L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
           attribution: '© OpenStreetMap'
        }).addTo(map);

        const vanIcon = L.divIcon({ html: '🚐', className: 'text-3xl', iconSize: [30, 30] });
        const markerStart = L.marker(startPos).addTo(map).bindPopup("Parking");
        const markerEnd = L.marker(endPos).addTo(map).bindPopup("AUB Drop-off");
        const shuttle = L.marker(startPos, {icon: vanIcon}).addTo(map);

        let progress = 0;
        // 15 minute speed (900 seconds at ~60fps)
        const speed = 1 / (60 * 900); 

        function move() {
            progress += speed;
            if (progress > 1) progress = 0;
            const lat = startPos[0] + (endPos[0] - startPos[0]) * progress;
            const lng = startPos[1] + (endPos[1] - startPos[1]) * progress;
            shuttle.setLatLng([lat, lng]);
            requestAnimationFrame(move);
        }
        move();

        function updateTime() {
            const d = new Date();
            const m = d.getMinutes();
            const next = 15 - (m % 15);
            document.getElementById('next-dep').innerText = `In ${next} Mins`;
            
            const arrivalTime = new Date(d.getTime() + (next * 60000));
            document.getElementById('est-arr').innerText = arrivalTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        const lot = document.getElementById('lot');
        for (let i = 1; i <= 15; i++) {
            const div = document.createElement('div');
            const isFull = Math.random() > 0.7;
            div.className = `spot ${isFull ? 'occupied' : 'available'}`;
            div.innerText = i;
            if (!isFull) {
                div.onclick = () => {
                    document.querySelectorAll('.spot').forEach(s => s.classList.remove('selected'));
                    div.classList.add('selected');
                };
            }
            lot.appendChild(div);
        }
    </script>
</body>
</html>
